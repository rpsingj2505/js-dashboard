name: Fetch Campaign Data

on:
  schedule:
    - cron: '30 1 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch Google Sheet CSV
        run: |
          curl -L "https://docs.google.com/spreadsheets/d/e/2PACX-1vSKy2Drl8f_C1VhISDaqE923s8X9-frlQuSc7Vm8C2bqgfXjZOz1vHtPZgx1vcTrns8f_FF6HjO8rlu/pub?gid=0&single=true&output=csv" \
            -o data.csv \
            --fail \
            --silent \
            --show-error
          echo "Rows fetched: $(wc -l < data.csv)"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.csv
          git diff --staged --quiet || git commit -m "Auto-update data $(date +'%Y-%m-%d')"
          git push
